# ---- Production Docker Compose -------------------------------------------
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mushroom_cloud
      POSTGRES_USER: mushroom
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/db-ssl:/var/lib/postgresql/ssl:ro
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/ssl/server.crt
        -c ssl_key_file=/var/lib/postgresql/ssl/server.key
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mushroom -d mushroom_cloud" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # No exposed ports in production — only accessible via internal network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://mushroom:${DB_PASSWORD}@db:5432/mushroom_cloud"
      JWT_SECRET: "${JWT_SECRET}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
      CLERK_JWKS_URL: "${CLERK_JWKS_URL}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://turkclaw.net}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_PUBLIC_KEY: "${STRIPE_PUBLIC_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      APP_BASE_URL: "${APP_BASE_URL:-https://turkclaw.net}"
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      MAX_UPLOAD_SIZE_BYTES: "21474836480" # 20GB
      WORKER_MODE: "queue"  # Use file-based queue for worker container
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      ENVIRONMENT: "production"
    expose:
      - "8000"
    volumes:
      - appdata:/app/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATA_DIR: "/app/data"
      WORKER_POLL_INTERVAL: "5"
    volumes:
      - appdata:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://turkclaw.net/api}"
        NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}"
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  appdata:
