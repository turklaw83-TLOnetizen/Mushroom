groups:
  - name: mushroom_cloud_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate (> 5%)"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency > 5s"

      - alert: WorkerStuck
        expr: worker_status == 1 and changes(worker_status[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Background worker appears stuck"

      - alert: LLMErrors
        expr: increase(llm_errors_total[5m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "LLM API errors > 10 in 5 min"
