# ---- Nginx Reverse Proxy -------------------------------------------------
# SSL termination, API proxy, static asset caching, gzip, 20GB upload limit

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 20GB max upload
    client_max_body_size 20G;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Hide nginx version in error pages and headers
    server_tokens off;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Block common scanner/attack paths — drop connection immediately (no response)
    map $request_uri $is_scanner {
        default 0;
        ~*^/wp-             1;
        ~*^/wordpress       1;
        ~*^/xmlrpc          1;
        ~*\.php$            1;
        ~*^/admin(?!/)      1;
        ~*^/\.env           1;
        ~*^/\.git           1;
        ~*^/cgi-bin         1;
        ~*^/phpmyadmin      1;
        ~*^/vendor          1;
        ~*^/telescope       1;
        ~*^/debug           1;
        ~*^/actuator        1;
        ~*^/solr            1;
        ~*^/console         1;
        ~*^/manager         1;
        ~*^/owa             1;
        ~*^/ecp             1;
        ~*^/autodiscover    1;
    }

    # Upstream definitions
    upstream api_backend {
        server api:8000;
    }

    upstream frontend_backend {
        server frontend:3000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Drop scanner requests — closes connection with no response
        if ($is_scanner) {
            return 444;
        }

        # Rate-limit sign-in to prevent brute force
        location /sign-in {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API proxy
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            # 20GB upload support
            client_max_body_size 20G;
            proxy_request_buffering off;
        }

        # WebSocket proxy
        location /api/v1/ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Block common attack paths (WordPress, phpMyAdmin, etc.)
        # NOTE: /admin is a legitimate app route — do NOT block it here.
        location ~* ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|phpmyadmin|myadmin|mysqladmin|pma|dbadmin|\.env|\.git|cgi-bin) {
            return 444;
        }

        # Frontend
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static asset caching
        location /_next/static/ {
            proxy_pass http://frontend_backend;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }
}
