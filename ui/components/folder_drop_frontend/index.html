<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

  #drop-zone {
    border: 2px dashed var(--border-color, #ccc);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    cursor: default;
    transition: all 0.2s ease;
    background: var(--bg-color, #fafafa);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  #drop-zone.drag-over {
    border-color: #ff6b35;
    background: var(--hover-bg, #fff5f0);
    transform: scale(1.01);
  }

  #drop-zone .icon { font-size: 24px; }
  #drop-zone .label { font-size: 14px; font-weight: 600; color: var(--text-color, #333); }
  #drop-zone .hint { font-size: 11px; color: var(--hint-color, #888); }

  #status {
    margin-top: 6px;
    font-size: 11px;
    color: var(--hint-color, #666);
    text-align: center;
  }

  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--progress-bg, #e0e0e0);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #ff6b35;
    transition: width 0.2s;
    width: 0%;
  }

  .error { color: #d32f2f !important; }
  .success { color: #2e7d32 !important; }
</style>
</head>
<body>
<div id="drop-zone">
  <div class="icon">&#128193;</div>
  <div class="label">Drop Folder Here</div>
  <div class="hint">Drag a folder from Windows Explorer</div>
</div>
<div id="status"></div>
<div class="progress-bar" id="progress-bar" style="display:none;">
  <div class="progress-fill" id="progress-fill"></div>
</div>

<script>
// ---- Streamlit Component Communication (raw postMessage API) ----
function sendMsg(type, data) {
  console.log("[folder-drop-js] sendMsg:", type, data ? JSON.stringify(data).substring(0, 200) : "");
  window.parent.postMessage(
    Object.assign({isStreamlitMessage: true, type: type}, data || {}),
    "*"
  );
}

let args = {};
let supportedExts = [];

window.addEventListener("message", function(event) {
  if (!event.data) return;
  if (event.data.type === "streamlit:render") {
    console.log("[folder-drop-js] Received streamlit:render, args:", JSON.stringify(event.data.args || {}).substring(0, 100));
    args = event.data.args || {};
    supportedExts = (args.supported_extensions || []).map(function(e) { return e.toLowerCase(); });
    var h = args.height || 120;
    document.getElementById("drop-zone").style.minHeight = h + "px";
    sendMsg("streamlit:setFrameHeight", {height: h + 30});

    // Apply Streamlit theme if provided
    var theme = event.data.theme;
    if (theme) {
      var root = document.documentElement;
      root.style.setProperty("--bg-color", theme.secondaryBackgroundColor || "#fafafa");
      root.style.setProperty("--text-color", theme.textColor || "#333");
      root.style.setProperty("--border-color", theme.textColor ? (theme.textColor + "44") : "#ccc");
      root.style.setProperty("--hint-color", theme.textColor ? (theme.textColor + "99") : "#888");
      root.style.setProperty("--hover-bg", theme.primaryColor ? (theme.primaryColor + "18") : "#fff5f0");
      root.style.setProperty("--progress-bg", theme.secondaryBackgroundColor || "#e0e0e0");
    }
  }
});

sendMsg("streamlit:componentReady", {apiVersion: 1});

// ---- Drop Zone Logic ----
var dropZone = document.getElementById("drop-zone");
var statusEl = document.getElementById("status");
var progressBar = document.getElementById("progress-bar");
var progressFill = document.getElementById("progress-fill");

// Prevent default drag behavior on the whole document
document.addEventListener("dragover", function(e) { e.preventDefault(); });
document.addEventListener("drop", function(e) { e.preventDefault(); });

dropZone.addEventListener("dragover", function(e) {
  e.preventDefault();
  e.stopPropagation();
  dropZone.classList.add("drag-over");
});

dropZone.addEventListener("dragleave", function(e) {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
});

dropZone.addEventListener("drop", function(e) {
  e.preventDefault();
  e.stopPropagation();
  dropZone.classList.remove("drag-over");
  handleDrop(e);
});

async function handleDrop(e) {
  console.log("[folder-drop-js] handleDrop triggered, items:", e.dataTransfer.items.length);
  statusEl.textContent = "Scanning folder...";
  statusEl.className = "";
  progressBar.style.display = "block";
  progressFill.style.width = "10%";

  try {
    var items = e.dataTransfer.items;
    var allFiles = [];
    var rootFolderName = "";
    var hadDirectory = false;

    // Read all dropped items
    for (var i = 0; i < items.length; i++) {
      var entry = null;
      if (items[i].webkitGetAsEntry) {
        entry = items[i].webkitGetAsEntry();
      }
      if (entry) {
        if (entry.isDirectory) {
          hadDirectory = true;
          if (!rootFolderName) rootFolderName = entry.name;
        }
        await readEntryRecursive(entry, allFiles, "");
      } else {
        var file = items[i].getAsFile();
        if (file) {
          allFiles.push({name: file.name, path: file.name, size: file.size});
        }
      }
    }

    progressFill.style.width = "50%";

    if (allFiles.length === 0) {
      statusEl.textContent = "No files found. Make sure you dropped a folder.";
      statusEl.className = "error";
      progressBar.style.display = "none";
      return;
    }

    // If only individual files were dropped (no directory), hint to use the uploader
    if (!hadDirectory) {
      statusEl.textContent = "Use the file uploader above for individual files. This zone is for folders.";
      statusEl.className = "error";
      progressBar.style.display = "none";
      return;
    }

    // Filter by supported extensions
    var filtered = allFiles.filter(function(f) {
      if (supportedExts.length === 0) return true;
      var dot = f.name.lastIndexOf(".");
      if (dot === -1) return false;
      var ext = f.name.substring(dot).toLowerCase();
      return supportedExts.indexOf(ext) !== -1;
    });

    var skipped = allFiles.length - filtered.length;

    if (filtered.length === 0) {
      statusEl.textContent = "Found " + allFiles.length + " file(s) but none match supported types.";
      statusEl.className = "error";
      progressBar.style.display = "none";
      return;
    }

    // Compute total size for display
    var totalBytes = 0;
    for (var j = 0; j < filtered.length; j++) totalBytes += filtered[j].size;
    var totalMB = totalBytes / (1024 * 1024);
    var sizeLabel = totalMB < 1 ? (totalBytes / 1024).toFixed(0) + " KB"
                  : totalMB < 1024 ? totalMB.toFixed(1) + " MB"
                  : (totalMB / 1024).toFixed(1) + " GB";

    progressFill.style.width = "100%";

    // Build METADATA-ONLY result (no file content — Python reads from disk)
    var result = [];
    for (var k = 0; k < filtered.length; k++) {
      result.push({
        name: filtered[k].name,
        relative_path: filtered[k].path,
        size: filtered[k].size
      });
    }

    var msg = "\u2713 " + result.length + " file(s) found (" + sizeLabel + ")";
    if (skipped > 0) msg += ", " + skipped + " unsupported skipped";
    statusEl.textContent = msg;
    statusEl.className = "success";

    // Send metadata + folder name to Streamlit (tiny payload, no size limits)
    console.log("[folder-drop-js] Sending to Streamlit:", rootFolderName, result.length, "files", totalBytes, "bytes");
    sendMsg("streamlit:setComponentValue", {
      value: {
        folder_name: rootFolderName,
        files: result,
        total_bytes: totalBytes
      }
    });
    console.log("[folder-drop-js] setComponentValue sent successfully");

  } catch (err) {
    statusEl.textContent = "Error: " + err.message;
    statusEl.className = "error";
    progressBar.style.display = "none";
  }
}

// ---- FileSystem API helpers ----

async function readEntryRecursive(entry, files, basePath) {
  if (entry.isFile) {
    var file = await new Promise(function(resolve, reject) {
      entry.file(resolve, reject);
    });
    // Only capture metadata — no content reading
    files.push({name: file.name, path: basePath + file.name, size: file.size});
  } else if (entry.isDirectory) {
    var reader = entry.createReader();
    var entries = await readAllEntries(reader);
    for (var i = 0; i < entries.length; i++) {
      await readEntryRecursive(entries[i], files, basePath + entry.name + "/");
    }
  }
}

function readAllEntries(reader) {
  return new Promise(function(resolve) {
    var all = [];
    function readBatch() {
      reader.readEntries(function(batch) {
        if (batch.length === 0) {
          resolve(all);
        } else {
          for (var i = 0; i < batch.length; i++) all.push(batch[i]);
          readBatch();  // readEntries returns max 100 entries at a time
        }
      });
    }
    readBatch();
  });
}
</script>
</body>
</html>
