services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mushroom_cloud
      POSTGRES_USER: mushroom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdevpass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mushroom -d mushroom_cloud"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- FastAPI Backend ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://mushroom:${DB_PASSWORD:-localdevpass}@db:5432/mushroom_cloud"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY:-}"
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # ---- Next.js Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8000"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}"
    ports:
      - "3000:3000"
    command: npm run dev

volumes:
  pgdata:
