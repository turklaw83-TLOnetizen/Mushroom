# ---- Development Docker Compose ------------------------------------------
# Usage: docker compose up
version: "3.9"

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mushroom_cloud
      POSTGRES_USER: mushroom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdevpass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mushroom -d mushroom_cloud" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- FastAPI Backend ----
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://mushroom:${DB_PASSWORD:-localdevpass}@db:5432/mushroom_cloud"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      XAI_API_KEY: "${XAI_API_KEY:-}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY:-}"
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./api:/app/api
      - ./core:/app/core
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ---- Next.js Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
    command: npm run dev
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/" ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

networks:
  default:
    name: mushroom

volumes:
  pgdata:
